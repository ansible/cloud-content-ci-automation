name: Build Collection

on:
  workflow_call:
    inputs:
      required_collections:
        description: |
          The comma-separated list of collections to build with an optional reference to checkout.
          When no referene is defined, the process will checkout the default version.
          e.g. github.com/ansible-collections/amazon.aws:stable-4,github.com/ansible-collections/ansible.utils.
        type: string

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix_repos: ${{ steps.set-matrix.outputs.repos }}
    steps:
      - name: Parse String to JSON
        id: set-matrix
        env:
          collections_paths: "${{ inputs.required_collections }}"
        uses: actions/github-script@v7
        with:
          script: |
            const raw = process.env.collections_paths; 
            const repoObjects = raw.split(',')
              .map(item => {
                const [name, ref] = item.trim().split(':');
                return { 
                  name: name, 
                  ref: ref || '' // If no colon, ref is empty string (default branch)
                };
              })
              .filter(item => item.name.length > 0);
            
            core.setOutput('repos', JSON.stringify(repoObjects));

      - name: Display output
        run: |
          echo "Repositories: $REPOS"
        env:
          REPOS: '${{ steps.set-matrix.outputs.repos }}'

  build-collection:
    needs: setup-matrix
    runs-on: ubuntu-latest
    env:
      collection_path: "./collection"
    strategy:
      matrix:
        repo: ${{ fromJSON(needs.setup-matrix.outputs.matrix_repos) }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          repository: ${{ matrix.repo.name }}
          ref: ${{ matrix.repo.ref }}
          path: ${{ env.collection_path }}

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ruamel.yaml pbr

      - name: Generate Version Info
        shell: python
        run: |
          import os
          import pbr.version
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.explicit_start = True
          yaml.indent(sequence=4, offset=2)

          galaxy_path = os.path.join(os.path.expanduser(path), 'galaxy.yml')
          config = yaml.load(open(galaxy_path))
          try:
              galaxy_version = str(config.get('version')).replace("-", ".")
              galaxy_version = pbr.version.SemanticVersion.from_pip_string(galaxy_version)
          except (ValueError, TypeError):
              raise KeyError(f"Galaxy version error for collection path {path!r}")

          galaxy_long_version = galaxy_version._long_version('-')
          if str(galaxy_long_version) != str(config.get('version')):
            config['version'] = galaxy_long_version
            with open(galaxy_path, 'w') as fp:
                yaml.dump(config, fp)

      - name: Build Collection
        run: ansible-galaxy collection build ${{ env.collection_path }} --output-path ./tarballs

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          # Use the repo name in the artifact name to avoid overwriting
          name: tarball-${{ strategy.job-index }}
          path: ./tarballs/*.tar.gz
